<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>🐍 貪吃蛇遊戲</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="manifest" href="manifest.json">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icon/icon-512x512.png">
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    body { 
      background-color: #0b0e11; 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      color: white; 
      font-family: "Microsoft JhengHei", "微軟正黑體", sans-serif; 
      margin: 0; 
      padding: 10px 0;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      min-height: 100vh;
      overflow: hidden;
    }
    h1 { margin: 5px 0; font-size: 22px; color: #fff; }
    
    #status { margin: 2px 0; font-size: 14px; color: #aaa; height: 1.2em; }
    
    #top-bar {
      display: flex;
      justify-content: space-between;
      width: 320px;
      max-width: 90vw;
      margin-bottom: 5px;
      font-size: 14px;
      color: #6cf;
    }

    #game-container {
      position: relative;
      width: 320px;
      height: 320px;
      max-width: 85vw;
      max-height: 85vw;
      aspect-ratio: 1/1;
    }
    canvas { 
      background-color: #111; 
      border: 2px solid #333; 
      width: 100%;
      height: 100%;
      display: block;
      image-rendering: pixelated;
    }

    #controls { 
      margin-top: 10px; 
      display: grid; 
      grid-template-columns: repeat(3, 60px); 
      gap: 10px; 
      justify-content: center; 
    }
    .btn { 
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
      color: #ddd; 
      width: 60px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 15px; 
      font-size: 24px; 
      cursor: pointer;
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: all 0.2s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:hover {
      background: rgba(255, 255, 255, 0.15);
      transform: scale(1.08);
      border-color: rgba(102, 204, 255, 0.4);
    }
    .btn:active { 
      transform: scale(0.95);
      background: rgba(102, 204, 255, 0.2);
    }

    #replay-link { 
      color: #6cf; 
      margin-top: 10px; 
      font-size: 14px; 
      text-decoration: none; 
      padding: 6px 12px; 
      border: 1px solid #6cf; 
      border-radius: 4px; 
      transition: all 0.2s;
    }

    #history-toggle {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 50px;
      height: 50px;
      cursor: pointer;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.5));
      transition: transform 0.2s;
    }
    #history-toggle:hover { transform: scale(1.1); }

    #history-modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 5000;
      padding: 20px;
    }
    #history-modal.open { display: flex; }
    #modal-content {
      background: #1c1f22;
      width: 100%;
      max-width: 350px;
      border-radius: 12px;
      padding: 15px;
      display: flex;
      flex-direction: column;
      max-height: 80vh;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }
    .modal-header h2 { margin: 0; font-size: 18px; color: #fff; }
    .clear-btn { color: #f44336; cursor: pointer; font-size: 14px; margin-right: 15px; }
    .close-btn { color: #fff; cursor: pointer; font-size: 24px; }
    #history-list {
      flex: 1;
      overflow-y: auto;
      padding-right: 5px;
    }
    .history-item {
      background: #2a2d31;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      position: relative;
    }
    .history-info div:first-child { font-size: 14px; color: #fff; margin-bottom: 4px; }
    .history-info div:last-child { font-size: 11px; color: #7c8187; }
    .delete-item { color: #f44336; padding: 5px; font-size: 18px; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #3b4050; border-radius: 3px; }
  </style>
</head>
<body>
  <h1>🐍 貪吃蛇遊戲</h1>
  <p id="status">請按 Enter 或觸控方向鍵開始</p>
  <div id="top-bar">
    <span id="best-score">最佳：0</span>
    <span id="current-score">得分：0</span>
  </div>
  
  <div id="game-container">
    <canvas id="game" width="400" height="400"></canvas>
  </div>

  <div id="controls">
    <div></div> <div class="btn" id="up">↑</div> <div></div>
    <div class="btn" id="left">←</div> <div class="btn" id="down">↓</div> <div class="btn" id="right">→</div>
  </div>

  <a id="replay-link" href="#" style="display:none;">分享上局回放</a>

  <img id="history-toggle" src="https://img.icons8.com/color/96/scroll.png" alt="歷史紀錄">

  <div id="history-modal">
    <div id="modal-content">
      <div class="modal-header">
        <h2>解題紀錄</h2>
        <div style="display:flex; align-items:center;">
          <span class="clear-btn" id="clear-history">清空</span>
          <span class="close-btn" id="close-modal">&times;</span>
        </div>
      </div>
      <div id="history-list"></div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }

    const firebaseConfig = {
      apiKey: "AIzaSyAtkZyxuP2alDTUm1AA7EAlPYSvvZAznEI",
      authDomain: "cogent-altar-468009-p7.firebaseapp.com",
      projectId: "cogent-altar-468009-p7",
      storageBucket: "cogent-altar-468009-p7.firebasestorage.app",
      messagingSenderId: "849610525376",
      appId: "1:849610525376:web:154b5103d027710734fb25"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const statusText = document.getElementById("status");
    const bestScoreText = document.getElementById("best-score");
    const currentScoreText = document.getElementById("current-score");
    const replayLink = document.getElementById("replay-link");
    const historyToggle = document.getElementById("history-toggle");
    const historyModal = document.getElementById("history-modal");
    const historyList = document.getElementById("history-list");
    const clearHistory = document.getElementById("clear-history");
    const closeModal = document.getElementById("close-modal");

    const gridSize = 20;
    const tileCount = 20;

    let snake, apple, dx, dy, score, bestScore, frameCount;
    let gameHistory, initialState;
    let gameState = 'initial';
    let lastTime = 0;
    const gameSpeed = 150; 

    bestScore = parseInt(localStorage.getItem("bestScore")) || 0;
    bestScoreText.innerText = "最佳：" + bestScore;

    function resetGame(isFirstReset = true) {
      snake = [{ x: 10, y: 10 }];
      apple = { x: 15, y: 15 };
      dx = 0; dy = 0;
      score = 0;
      gameState = 'initial';
      frameCount = 0;
      gameHistory = [];
      initialState = {
        snake: JSON.parse(JSON.stringify(snake)),
        apple: { ...apple }
      };

      currentScoreText.innerText = "得分：0";
      if (!isFirstReset) {
        replayLink.style.display = "none";
        statusText.innerText = "請按 Enter 或觸控方向鍵開始";
      } else {
        statusText.innerText = "按 Enter 重新開始或查看回放";
      }
    }

    resetGame(false);

    window.addEventListener('load', () => {
      const urlParams = new URLSearchParams(window.location.search);
      const lastReplayId = urlParams.get('last_replay_id');
      if (lastReplayId) {
        replayLink.href = `replay.html?id=${lastReplayId}`;
        replayLink.style.display = 'inline-block';
        gameState = 'gameOver';
        statusText.innerText = "按 Enter 重新開始或查看回放";
      }
      renderHistory();
    });

    function handleDirectionChange(newDx, newDy, moveCode) {
      if (gameState === 'initial') {
        gameState = 'playing';
        statusText.innerText = "";
        replayLink.style.display = 'none';
      }
      dx = newDx; dy = newDy;
      gameHistory.push({ frame: frameCount, move: moveCode });
    }

    document.addEventListener("keydown", (e) => {
      if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", " "].includes(e.key)) {
        e.preventDefault();
      }
      if (gameState === 'playing') {
        if (e.key === "ArrowUp" && dy === 0) handleDirectionChange(0, -1, 'u');
        else if (e.key === "ArrowDown" && dy === 0) handleDirectionChange(0, 1, 'd');
        else if (e.key === "ArrowLeft" && dx === 0) handleDirectionChange(-1, 0, 'l');
        else if (e.key === "ArrowRight" && dx === 0) handleDirectionChange(1, 0, 'r');
      } else if (gameState === 'initial') {
        if (e.key === "ArrowUp") handleDirectionChange(0, -1, 'u');
        else if (e.key === "ArrowDown") handleDirectionChange(0, 1, 'd');
        else if (e.key === "ArrowLeft") handleDirectionChange(-1, 0, 'l');
        else if (e.key === "ArrowRight" || e.key === "Enter") handleDirectionChange(1, 0, 'r');
      } else if (gameState === 'gameOver' && e.key === "Enter") {
        resetGame(false);
      }
    });

    function handleTouch(direction) {
      if (gameState === 'playing') {
        if (direction === "up" && dy === 0) handleDirectionChange(0, -1, 'u');
        else if (direction === "down" && dy === 0) handleDirectionChange(0, 1, 'd');
        else if (direction === "left" && dx === 0) handleDirectionChange(-1, 0, 'l');
        else if (direction === "right" && dx === 0) handleDirectionChange(1, 0, 'r');
      } else if (gameState === 'initial') {
        if (direction === "up") handleDirectionChange(0, -1, 'u');
        else if (direction === "down") handleDirectionChange(0, 1, 'd');
        else if (direction === "left") handleDirectionChange(-1, 0, 'l');
        else handleDirectionChange(1, 0, 'r');
      } else if (gameState === 'gameOver') {
        resetGame(false);
      }
    }

    ["up", "down", "left", "right"].forEach(dir => {
      document.getElementById(dir).addEventListener('pointerdown', (e) => {
        e.preventDefault();
        handleTouch(dir);
      });
    });

    async function saveReplayToFirebase(win = false) {
      gameState = 'gameOver';
      try {
        statusText.innerText = "紀錄中...";
        const replayDoc = await db.collection("replays").add({
          initialState: initialState,
          moves: gameHistory,
          finalScore: score,
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),
          algorithmVersion: 4
        });
        replayLink.href = `replay.html?id=${replayDoc.id}`;
        replayLink.style.display = "inline-block";
        statusText.innerText = win ? "勝利！按 Enter 重新開始" : "得分：" + score + "。按 Enter 重新開始";
        saveHistory(replayDoc.id, score);
      } catch (error) {
        console.error(error);
        statusText.innerText = "儲存失敗。";
      }
    }

    function saveHistory(id, s) {
      const history = JSON.parse(localStorage.getItem('snakeHistory') || '[]');
      history.unshift({ id, score: s, date: new Date().toLocaleString('zh-TW') });
      localStorage.setItem('snakeHistory', JSON.stringify(history.slice(0, 20)));
      renderHistory();
    }

    function renderHistory() {
      const history = JSON.parse(localStorage.getItem('snakeHistory') || '[]');
      historyList.innerHTML = history.length ? '' : '<div style="text-align:center;color:#555;margin-top:40px;">尚無紀錄</div>';
      history.forEach((item, idx) => {
        const div = document.createElement('div');
        div.className = 'history-item';
        div.innerHTML = `
          <div class="history-info" onclick="window.location.href='replay.html?id=${item.id}'">
            <div>得分：${item.score}</div>
            <div>${item.date}</div>
          </div>
          <span class="delete-item" onclick="deleteHistory(${idx}, event)">&times;</span>
        `;
        historyList.appendChild(div);
      });
    }
    
    window.deleteHistory = (idx, e) => {
      e.stopPropagation();
      const history = JSON.parse(localStorage.getItem('snakeHistory') || '[]');
      history.splice(idx, 1);
      localStorage.setItem('snakeHistory', JSON.stringify(history));
      renderHistory();
    };

    clearHistory.onclick = () => {
      if (confirm('確定清空所有紀錄嗎？')) {
        localStorage.removeItem('snakeHistory');
        renderHistory();
      }
    };
    historyToggle.onclick = () => historyModal.classList.add('open');
    closeModal.onclick = () => historyModal.classList.remove('open');
    historyModal.onclick = (e) => { if (e.target === historyModal) historyModal.classList.remove('open'); };

    function generateApple() {
      const emptyCells = [];
      const snakeCellSet = new Set(snake.map(s => `${s.x},${s.y}`));
      for (let x = 0; x < tileCount; x++) {
        for (let y = 0; y < tileCount; y++) {
          if (!snakeCellSet.has(`${x},${y}`)) emptyCells.push({ x, y });
        }
      }
      if (emptyCells.length > 0) {
        const h = snake[0];
        const deterministicIndex = (h.x * 7 + h.y * 13 + score * 17 + frameCount * 3) % emptyCells.length;
        apple = emptyCells[deterministicIndex];
      } else {
        saveReplayToFirebase(true);
      }
    }

    function gameLoop(currentTime) {
      requestAnimationFrame(gameLoop);
      if (gameState !== 'playing') return;
      if (currentTime - lastTime < gameSpeed) return;
      lastTime = currentTime;

      frameCount++;
      const head = { x: snake[0].x + dx, y: snake[0].y + dy };
      if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount || snake.some(s => s.x === head.x && s.y === head.y)) {
        saveReplayToFirebase();
        if (score > bestScore) {
          bestScore = score;
          localStorage.setItem("bestScore", bestScore);
          bestScoreText.innerText = "最佳：" + bestScore;
        }
        return;
      }

      snake.unshift(head);
      if (head.x === apple.x && head.y === apple.y) {
        score++;
        if (snake.length >= tileCount * tileCount) {
          saveReplayToFirebase(true);
          return;
        }
        generateApple();
      } else {
        snake.pop();
      }

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "red";
      ctx.fillRect(apple.x * gridSize, apple.y * gridSize, gridSize, gridSize);
      ctx.fillStyle = "lime";
      for (let s of snake) {
        ctx.fillRect(s.x * gridSize, s.y * gridSize, gridSize - 1, gridSize - 1);
      }
      currentScoreText.innerText = "得分：" + score;
    }

    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
