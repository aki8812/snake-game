<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>🐍 貪吃蛇遊戲</title>
  <meta name="description" content="這是一款流暢且充滿樂趣的貪吃蛇遊戲，支援 PWA、回放分享以及最佳分數紀錄。">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="manifest" href="manifest.json">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icon/icon-512x512.png">
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    body { 
      background-color: #000; 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      color: white; 
      font-family: "Microsoft JhengHei", "微軟正黑體", sans-serif; 
      margin: 0; 
      padding-top: 20px;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      min-height: 100vh;
      overflow-x: hidden;
    }
    h1 { margin: 10px 0; font-size: 28px; }
    #status, #best-score { margin: 5px; }
    canvas { 
      background-color: #111; 
      border: 3px solid #fff; 
      max-width: 90vw;
      width: 400px;
      height: 400px;
      aspect-ratio: 1 / 1;
    }
    #controls { 
      margin-top: 15px; 
      display: grid; 
      grid-template-columns: repeat(3, 70px); 
      gap: 12px; 
      justify-content: center; 
    }
    .btn { 
      background: #444; 
      color: white; 
      width: 70px;
      height: 70px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px; 
      font-size: 24px; 
      user-select: none; 
      -webkit-tap-highlight-color: transparent;
      transition: background 0.1s;
    }
    .btn:active { background: #777; }
    #replay-link { 
      color: #6cf; 
      margin-top: 20px; 
      font-size: 18px; 
      text-decoration: none; 
      padding: 8px 16px; 
      border: 1px solid #6cf; 
      border-radius: 5px; 
    }
    #replay-link:hover { background-color: #6cf; color: black; }
    
    #aki-footer {
      position: fixed;
      bottom: 20px;
      left: 20px;
      color: #ffeb3b;
      font-weight: bold;
      font-size: 1rem;
      font-family: 'Roboto Mono', monospace;
      cursor: default;
      user-select: none;
      display: flex;
      gap: 2px;
      z-index: 2147483647;
      pointer-events: auto;
    }
    .char-span { display: inline-block; transition: transform 0.1s ease-out; will-change: transform; }

    ::-webkit-scrollbar { width: 10px; }
    ::-webkit-scrollbar-track { background: #222; }
    ::-webkit-scrollbar-thumb { background: #6cf; border-radius: 5px; }
    ::-webkit-scrollbar-thumb:hover { background: #8df; }
  </style>
</head>
<body>
  <h1>🐍 貪吃蛇遊戲</h1>
  <p id="status">請按 Enter 或觸控方向鍵開始</p>
  <div style="display: flex; gap: 20px; margin-bottom: 5px;">
    <p id="best-score" style="margin: 0;">最佳分數：0</p>
    <p id="current-score" style="margin: 0;">目前分數：0</p>
  </div>
  <canvas id="game" width="400" height="400"></canvas>

  <div id="controls">
    <div></div> <div class="btn" id="up">↑</div> <div></div>
    <div class="btn" id="left">←</div> <div class="btn" id="down">↓</div> <div class="btn" id="right">→</div>
  </div>

  <a id="replay-link" href="#" style="display:none;">分享你的上一局回放！</a>

  <div id="aki-footer">Made by Aki</div>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }

    const firebaseConfig = {
      apiKey: "AIzaSyAtkZyxuP2alDTUm1AA7EAlPYSvvZAznEI",
      authDomain: "cogent-altar-468009-p7.firebaseapp.com",
      projectId: "cogent-altar-468009-p7",
      storageBucket: "cogent-altar-468009-p7.firebasestorage.app",
      messagingSenderId: "849610525376",
      appId: "1:849610525376:web:154b5103d027710734fb25"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const statusText = document.getElementById("status");
    const bestScoreText = document.getElementById("best-score");
    const replayLink = document.getElementById("replay-link");

    const gridSize = 20;
    const tileCount = canvas.width / gridSize;

    let snake, apple, dx, dy, score, bestScore, frameCount;
    let gameHistory, initialState;
    let gameState = 'initial';

    bestScore = parseInt(localStorage.getItem("bestScore")) || 0;
    bestScoreText.innerText = "最佳分數：" + bestScore;

    function resetGame(isFirstReset = true) {
      snake = [{ x: 10, y: 10 }];
      apple = { x: 15, y: 15 };
      dx = 0; dy = 0;
      score = 0;
      gameState = 'initial';
      frameCount = 0;
      gameHistory = [];
      initialState = {
          snake: JSON.parse(JSON.stringify(snake)),
          apple: { ...apple }
      };

      if (!isFirstReset) {
        replayLink.style.display = "none";
        statusText.innerText = "請按 Enter 或觸控方向鍵開始";
      } else {
        statusText.innerText = "請按 Enter 重新開始，或點擊上方連結觀看回放";
      }
    }

    resetGame(false);

    window.addEventListener('load', () => {
        const urlParams = new URLSearchParams(window.location.search);
        const lastReplayId = urlParams.get('last_replay_id');
        if (lastReplayId) {
            replayLink.href = `replay.html?id=${lastReplayId}`;
            replayLink.style.display = 'block';
            gameState = 'gameOver';
            statusText.innerText = "請按 Enter 重新開始，或點擊上方連結觀看回放";
        }
    });

    function handleDirectionChange(newDx, newDy, moveCode) {
        if (gameState === 'initial') {
            gameState = 'playing';
            statusText.innerText = "";
            replayLink.style.display = 'none';
        }
        dx = newDx;
        dy = newDy;
        gameHistory.push({ frame: frameCount, move: moveCode });
    }

    document.addEventListener("keydown", (e) => {
      if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", " "].includes(e.key)) {
        e.preventDefault();
      }
      if (gameState === 'playing') {
        if (e.key === "ArrowUp" && dy === 0) handleDirectionChange(0, -1, 'u');
        else if (e.key === "ArrowDown" && dy === 0) handleDirectionChange(0, 1, 'd');
        else if (e.key === "ArrowLeft" && dx === 0) handleDirectionChange(-1, 0, 'l');
        else if (e.key === "ArrowRight" && dx === 0) handleDirectionChange(1, 0, 'r');
      } else if (gameState === 'initial') {
        if (e.key === "ArrowUp") handleDirectionChange(0, -1, 'u');
        else if (e.key === "ArrowDown") handleDirectionChange(0, 1, 'd');
        else if (e.key === "ArrowLeft") handleDirectionChange(-1, 0, 'l');
        else if (e.key === "ArrowRight" || e.key === "Enter") handleDirectionChange(1, 0, 'r');
      } else if (gameState === 'gameOver' && e.key === "Enter") {
        resetGame(false);
      }
    });

    function handleTouch(direction) {
      if (gameState === 'playing') {
        if (direction === "up" && dy === 0) handleDirectionChange(0, -1, 'u');
        else if (direction === "down" && dy === 0) handleDirectionChange(0, 1, 'd');
        else if (direction === "left" && dx === 0) handleDirectionChange(-1, 0, 'l');
        else if (direction === "right" && dx === 0) handleDirectionChange(1, 0, 'r');
      } else if (gameState === 'initial') {
        if (direction === "up") handleDirectionChange(0, -1, 'u');
        else if (direction === "down") handleDirectionChange(0, 1, 'd');
        else if (direction === "left") handleDirectionChange(-1, 0, 'l');
        else handleDirectionChange(1, 0, 'r');
      } else if (gameState === 'gameOver') {
        resetGame(false);
      }
    }

    const setupBtn = (id, dir) => {
      const btn = document.getElementById(id);
      btn.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        handleTouch(dir);
      });
    };
    setupBtn("up", "up");
    setupBtn("down", "down");
    setupBtn("left", "left");
    setupBtn("right", "right");

    async function saveReplayToFirebase(win = false) {
      gameState = 'gameOver';
      try {
        statusText.innerText = "正在上傳紀錄...";
        const replayDoc = await db.collection("replays").add({
          initialState: initialState,
          moves: gameHistory,
          finalScore: score,
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),
          algorithmVersion: 4
        });
        replayLink.href = `replay.html?id=${replayDoc.id}`;
        replayLink.style.display = "block";
        statusText.innerText = win ? "恭喜你！完全勝利！請按 Enter 重新開始" : "遊戲結束！你的分數是：" + score + "，請按 Enter 重新開始";
      } catch (error) {
        console.error(error);
        statusText.innerText = "儲存紀錄失敗。";
      }
    }

    function generateApple() {
      const emptyCells = [];
      const snakeCellSet = new Set(snake.map(s => `${s.x},${s.y}`));
      for (let x = 0; x < tileCount; x++) {
        for (let y = 0; y < tileCount; y++) {
          if (!snakeCellSet.has(`${x},${y}`)) emptyCells.push({ x, y });
        }
      }
      if (emptyCells.length > 0) {
        const h = snake[0];
        const deterministicIndex = (h.x * 7 + h.y * 13 + score * 17 + frameCount * 3) % emptyCells.length;
        apple = emptyCells[deterministicIndex];
      } else {
        saveReplayToFirebase(true);
      }
    }

    function gameLoop() {
      if (gameState !== 'playing') return;

      frameCount++;
      const head = { x: snake[0].x + dx, y: snake[0].y + dy };

      if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount || snake.some(s => s.x === head.x && s.y === head.y)) {
        saveReplayToFirebase();
        if (score > bestScore) {
          bestScore = score;
          localStorage.setItem("bestScore", bestScore);
          bestScoreText.innerText = "最佳分數：" + bestScore;
        }
        return;
      }

      snake.unshift(head);

      if (head.x === apple.x && head.y === apple.y) {
        score++;
        if (snake.length >= tileCount * tileCount) {
          saveReplayToFirebase(true);
          return;
        }
        generateApple();
      } else {
        snake.pop();
      }

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "red";
      ctx.fillRect(apple.x * gridSize, apple.y * gridSize, gridSize, gridSize);
      ctx.fillStyle = "lime";
      for (let s of snake) {
        ctx.fillRect(s.x * gridSize, s.y * gridSize, gridSize - 1, gridSize - 1);
      }
      document.getElementById("current-score").innerText = "目前分數：" + score;
    }

    setInterval(gameLoop, 150);

    const footer = document.getElementById('aki-footer');
    if (footer) {
      const text = footer.textContent;
      footer.textContent = '';
      const spans = [];
      for (let char of text) {
        const span = document.createElement('span');
        span.textContent = char;
        if (char === ' ') span.style.width = '0.5em';
        span.className = 'char-span';
        footer.appendChild(span);
        spans.push(span);
      }
      document.addEventListener('mousemove', (e) => {
        spans.forEach(span => {
          const rect = span.getBoundingClientRect();
          const distance = Math.sqrt(Math.pow(e.clientX - (rect.left + rect.width/2), 2) + Math.pow(e.clientY - (rect.top + rect.height/2), 2));
          if (distance < 60) {
            const force = (60 - distance) / 60;
            span.style.transform = `translate(${-(e.clientX - (rect.left + rect.width/2)) / distance * force * 10}px, ${-(e.clientY - (rect.top + rect.height/2)) / distance * force * 10}px)`;
          } else span.style.transform = 'translate(0, 0)';
        });
      });
    }
  </script>
</body>
</html>
