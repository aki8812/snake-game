<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>🐍 貪吃蛇遊戲</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="manifest" href="manifest.json">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icon/icon-512x512.png">
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    body { 
      background-color: #000; 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      color: white; 
      font-family: "Microsoft JhengHei", "微軟正黑體", sans-serif; 
      margin: 0; 
      padding: 40px 0 20px 0; 
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      min-height: 100vh;
      overflow: hidden;
      box-sizing: border-box;
    }
    
    .header-container {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }
    h1 { margin: 0; font-size: 24px; color: #fff; }

    #history-toggle {
      width: 28px;
      height: 28px;
      cursor: pointer;
      transition: transform 0.2s;
    }
    #history-toggle:hover { transform: scale(1.1); }

    #status { margin: 2px 0; font-size: 13px; color: #aaa; min-height: 1.2em; text-align: center; }
    
    #top-bar {
      display: flex;
      justify-content: space-between;
      width: 320px;
      max-width: 85vw;
      margin-bottom: 10px;
      font-size: 15px;
      color: #fff;
    }

    #game-container {
      position: relative;
      width: 320px;
      height: 320px;
      max-width: 80vw;
      max-height: 80vw;
      aspect-ratio: 1/1;
    }
    canvas { 
      background-color: #111; 
      border: 3px solid #fff; 
      width: 100%;
      height: 100%;
      display: block;
      image-rendering: pixelated;
      box-sizing: border-box;
    }

    #controls { 
      margin-top: 25px; 
      display: grid; 
      grid-template-columns: repeat(3, 62px); 
      gap: 15px; 
      justify-content: center; 
    }
    .btn { 
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      color: #fff; 
      width: 62px;
      height: 62px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 14px; 
      font-size: 24px; 
      cursor: pointer;
      border: 1px solid rgba(255, 255, 255, 0.15);
      transition: all 0.15s ease;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .btn:hover {
      background: rgba(255, 255, 255, 0.18);
      transform: scale(1.05); 
    }
    .btn:active { 
      transform: scale(0.96);
      background: rgba(255, 255, 255, 0.25);
    }

    #replay-link { 
      color: #6cf; 
      margin-top: 15px; 
      font-size: 15px; 
      text-decoration: none; 
      padding: 6px 14px; 
      border: 1px solid #6cf; 
      border-radius: 4px; 
      transition: all 0.2s;
    }

    #history-modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.82);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      padding: 20px;
    }
    #history-modal.open { display: flex; }
    #modal-content {
      background: #1c1f22;
      width: 100%;
      max-width: 320px;
      border-radius: 12px;
      padding: 18px;
      display: flex;
      flex-direction: column;
      max-height: 75vh;
      box-shadow: 0 10px 40px rgba(0,0,0,0.6);
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 1px solid #333;
    }
    .modal-header h2 { margin: 0; font-size: 18px; }
    
    .clear-btn { 
      color: #ff5252; 
      cursor: pointer; 
      font-size: 14px; 
      margin-right: 12px; 
      font-weight: bold; 
      transition: all 0.2s;
      white-space: nowrap;
    }
    .clear-btn.confirming {
      background: rgba(255, 82, 82, 0.1);
      padding: 4px 8px;
      border-radius: 4px;
    }

    .close-btn { color: #fff; cursor: pointer; font-size: 26px; line-height: 1; }
    
    #history-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    .empty-msg {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #666;
      font-size: 15px;
      height: 150px;
      text-align: center;
    }
    .history-item {
      background: #2a2d31;
      padding: 14px;
      border-radius: 8px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      transition: background 0.2s;
    }
    .history-item:active { background: #353a40; }
    .history-info { flex: 1; pointer-events: none; } 
    .history-info div:first-child { font-size: 15px; color: #fff; margin-bottom: 4px; font-weight: bold; }
    .history-info div:last-child { font-size: 11px; color: #777; }
    .delete-item { color: #ff5252; padding: 10px; font-size: 20px; cursor: pointer; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #3b4050; border-radius: 3px; }
  </style>
</head>
<body>
  <div class="header-container">
    <h1>🐍 貪吃蛇遊戲</h1>
    <img id="history-toggle" src="https://img.icons8.com/color/96/scroll.png" alt="歷史紀錄">
  </div>
  
  <p id="status">請按 Enter 或觸控方向鍵開始</p>
  
  <div id="top-bar">
    <span id="best-score">最高：0</span>
    <span id="current-score">得分：0</span>
  </div>
  
  <div id="game-container">
    <canvas id="game" width="400" height="400"></canvas>
  </div>

  <div id="controls">
    <div></div> <div class="btn" id="up">↑</div> <div></div>
    <div class="btn" id="left">←</div> <div class="btn" id="down">↓</div> <div class="btn" id="right">→</div>
  </div>

  <a id="replay-link" href="#" style="display:none;">觀看上一局回放</a>

  <div id="history-modal">
    <div id="modal-content">
      <div class="modal-header">
        <h2>解題紀錄</h2>
        <div style="display:flex; align-items:center;">
          <span class="clear-btn" id="clear-history">清空</span>
          <span class="close-btn" id="close-modal">&times;</span>
        </div>
      </div>
      <div id="history-list"></div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }

    const firebaseConfig = {
      apiKey: "AIzaSyAtkZyxuP2alDTUm1AA7EAlPYSvvZAznEI",
      authDomain: "cogent-altar-468009-p7.firebaseapp.com",
      projectId: "cogent-altar-468009-p7",
      storageBucket: "cogent-altar-468009-p7.firebasestorage.app",
      messagingSenderId: "849610525376",
      appId: "1:849610525376:web:154b5103d027710734fb25"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const statusText = document.getElementById("status");
    const bestScoreText = document.getElementById("best-score");
    const currentScoreText = document.getElementById("current-score");
    const replayLink = document.getElementById("replay-link");
    const historyToggle = document.getElementById("history-toggle");
    const historyModal = document.getElementById("history-modal");
    const historyList = document.getElementById("history-list");
    const clearHistory = document.getElementById("clear-history");
    const closeModal = document.getElementById("close-modal");

    const gridSize = 20;
    const tileCount = 20;

    let snake, apple, dx, dy, score, bestScore, frameCount;
    let gameHistory, initialState;
    let gameState = 'initial';
    let lastTime = 0;
    const gameSpeed = 150; 

    bestScore = parseInt(localStorage.getItem("bestScore")) || 0;
    bestScoreText.innerText = "最高：" + bestScore;

    function resetGame(isFirstReset = true) {
      snake = [{ x: 10, y: 10 }];
      apple = { x: 15, y: 15 };
      dx = 0; dy = 0;
      score = 0;
      gameState = 'initial';
      frameCount = 0;
      gameHistory = [];
      initialState = {
        snake: JSON.parse(JSON.stringify(snake)),
        apple: { ...apple }
      };

      currentScoreText.innerText = "得分：0";
      if (!isFirstReset) {
        replayLink.style.display = "none";
        statusText.innerText = "請按 Enter 或觸控方向鍵開始";
      } else {
        statusText.innerText = "按 Enter 重新開始或觀看回放";
      }
      renderHistory();
    }

    resetGame(false);

    window.addEventListener('load', () => {
      const urlParams = new URLSearchParams(window.location.search);
      const lastReplayId = urlParams.get('last_replay_id');
      if (lastReplayId) {
        replayLink.href = `replay.html?id=${lastReplayId}`;
        replayLink.style.display = 'inline-block';
        gameState = 'gameOver';
        statusText.innerText = "按 Enter 重新開始或觀看回放";
      }
      renderHistory();
    });

    function handleDirectionChange(newDx, newDy, moveCode) {
      if (gameState === 'initial') {
        gameState = 'playing';
        statusText.innerText = "";
        replayLink.style.display = 'none';
      }
      dx = newDx; dy = newDy;
      gameHistory.push({ frame: frameCount, move: moveCode });
    }

    document.addEventListener("keydown", (e) => {
      if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", " "].includes(e.key)) {
        e.preventDefault();
      }
      if (gameState === 'playing') {
        if (e.key === "ArrowUp" && dy === 0) handleDirectionChange(0, -1, 'u');
        else if (e.key === "ArrowDown" && dy === 0) handleDirectionChange(0, 1, 'd');
        else if (e.key === "ArrowLeft" && dx === 0) handleDirectionChange(-1, 0, 'l');
        else if (e.key === "ArrowRight" && dx === 0) handleDirectionChange(1, 0, 'r');
      } else if (gameState === 'initial') {
        if (e.key === "ArrowUp") handleDirectionChange(0, -1, 'u');
        else if (e.key === "ArrowDown") handleDirectionChange(0, 1, 'd');
        else if (e.key === "ArrowLeft") handleDirectionChange(-1, 0, 'l');
        else if (e.key === "ArrowRight" || e.key === "Enter") handleDirectionChange(1, 0, 'r');
      } else if (gameState === 'gameOver' && e.key === "Enter") {
        resetGame(false);
      }
    });

    function handleTouch(direction) {
      if (gameState === 'playing') {
        if (direction === "up" && dy === 0) handleDirectionChange(0, -1, 'u');
        else if (direction === "down" && dy === 0) handleDirectionChange(0, 1, 'd');
        else if (direction === "left" && dx === 0) handleDirectionChange(-1, 0, 'l');
        else if (direction === "right" && dx === 0) handleDirectionChange(1, 0, 'r');
      } else if (gameState === 'initial') {
        if (direction === "up") handleDirectionChange(0, -1, 'u');
        else if (direction === "down") handleDirectionChange(0, 1, 'd');
        else if (direction === "left") handleDirectionChange(-1, 0, 'l');
        else handleDirectionChange(1, 0, 'r');
      } else if (gameState === 'gameOver') {
        resetGame(false);
      }
    }

    ["up", "down", "left", "right"].forEach(dir => {
      const btn = document.getElementById(dir);
      const trigger = (e) => {
        e.preventDefault();
        handleTouch(dir);
      };
      btn.addEventListener('pointerdown', trigger);
    });

    async function saveReplayToFirebase(win = false) {
      const finalScore = score;
      gameState = 'gameOver';
      
      if (finalScore > bestScore) {
        bestScore = finalScore;
        localStorage.setItem("bestScore", bestScore);
        bestScoreText.innerText = "最高：" + bestScore;
      }

      try {
        statusText.innerText = "紀錄中...";
        const replayDoc = await db.collection("replays").add({
          initialState: initialState,
          moves: gameHistory,
          finalScore: finalScore,
          createdAt: firebase.firestore.FieldValue.serverTimestamp(),
          algorithmVersion: 4
        });
        replayLink.href = `replay.html?id=${replayDoc.id}`;
        replayLink.style.display = "inline-block";
        statusText.innerText = win ? "勝利！按 Enter 重新開始" : "得分：" + finalScore + "。按 Enter 重新開始";
        saveHistory(replayDoc.id, finalScore);
      } catch (error) {
        console.error(error);
        statusText.innerText = "儲存失敗。";
      }
    }

    function saveHistory(id, s) {
      const history = JSON.parse(localStorage.getItem('snakeHistory') || '[]');
      history.unshift({ id, score: s, date: new Date().toLocaleString('zh-TW') });
      localStorage.setItem('snakeHistory', JSON.stringify(history.slice(0, 20)));
      renderHistory();
    }

    function renderHistory() {
      const history = JSON.parse(localStorage.getItem('snakeHistory') || '[]');
      if (history.length === 0) {
        historyList.innerHTML = '<div class="empty-msg">尚無紀錄</div>';
      } else {
        historyList.innerHTML = '';
        history.forEach((item, idx) => {
          const div = document.createElement('div');
          div.className = 'history-item';
          div.onclick = () => window.location.href = `replay.html?id=${item.id}`; 
          const fullUrl = `replay.html?id=${item.id}`;
          div.innerHTML = `
            <div class="history-info">
              <div>得分：${item.score}</div>
              <div>${item.date}</div>
              <div style="font-size: 10px; color: #555; word-break: break-all; margin-top: 4px;">URL: ${fullUrl}</div>
            </div>
            <span class="delete-item" onclick="deleteHistory(${idx}, event)">&times;</span>
          `;
          historyList.appendChild(div);
        });
      }
    }
    
    window.deleteHistory = (idx, e) => {
      e.stopPropagation();
      const history = JSON.parse(localStorage.getItem('snakeHistory') || '[]');
      history.splice(idx, 1);
      localStorage.setItem('snakeHistory', JSON.stringify(history));
      renderHistory();
    };

    let clearConfirmTimeout;
    clearHistory.onclick = () => {
      if (clearHistory.classList.contains('confirming')) {
        localStorage.removeItem('snakeHistory');
        renderHistory();
        clearHistory.classList.remove('confirming');
        clearHistory.innerText = '清空';
        clearTimeout(clearConfirmTimeout);
      } else {
        clearHistory.classList.add('confirming');
        clearHistory.innerText = '確定清空？';
        clearConfirmTimeout = setTimeout(() => {
          clearHistory.classList.remove('confirming');
          clearHistory.innerText = '清空';
        }, 3000);
      }
    };

    historyToggle.onclick = () => historyModal.classList.add('open');
    closeModal.onclick = () => historyModal.classList.remove('open');
    historyModal.onclick = (e) => { if (e.target === historyModal) historyModal.classList.remove('open'); };

    function generateApple() {
      const emptyCells = [];
      const snakeCellSet = new Set(snake.map(s => `${s.x},${s.y}`));
      for (let x = 0; x < tileCount; x++) {
        for (let y = 0; y < tileCount; y++) {
          if (!snakeCellSet.has(`${x},${y}`)) emptyCells.push({ x, y });
        }
      }
      if (emptyCells.length > 0) {
        const h = snake[0];
        const deterministicIndex = (h.x * 7 + h.y * 13 + score * 17 + frameCount * 3) % emptyCells.length;
        apple = emptyCells[deterministicIndex];
      } else {
        saveReplayToFirebase(true);
      }
    }

    function gameLoop(currentTime) {
      requestAnimationFrame(gameLoop);
      if (gameState !== 'playing' || historyModal.classList.contains('open')) return;
      if (currentTime - lastTime < gameSpeed) return;
      lastTime = currentTime;

      frameCount++;
      const head = { x: snake[0].x + dx, y: snake[0].y + dy };
      if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount || snake.some(s => s.x === head.x && s.y === head.y)) {
        saveReplayToFirebase();
        return;
      }

      snake.unshift(head);
      if (head.x === apple.x && head.y === apple.y) {
        score++;
        if (snake.length >= tileCount * tileCount) {
          saveReplayToFirebase(true);
          return;
        }
        generateApple();
      } else {
        snake.pop();
      }

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "red";
      ctx.fillRect(apple.x * gridSize + 1, apple.y * gridSize + 1, gridSize - 2, gridSize - 2);
      ctx.fillStyle = "lime";
      for (let s of snake) {
        ctx.fillRect(s.x * gridSize + 1, s.y * gridSize + 1, gridSize - 2, gridSize - 2);
      }
      currentScoreText.innerText = "得分：" + score;
    }

    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
