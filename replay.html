<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>🐍 遊戲回放</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <link rel="icon" href="favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    body { 
      background-color: #000; 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      color: white; 
      font-family: "Microsoft JhengHei", "微軟正黑體", sans-serif; 
      margin: 0; 
      padding-top: 20px;
      min-height: 100vh;
      overflow: hidden;
    }
    h1 { margin: 5px 0; font-size: 24px; }
    
    #top-bar {
      display: flex;
      justify-content: space-between;
      width: 320px;
      max-width: 90vw;
      margin-bottom: 8px;
      color: white;
      font-size: 16px;
    }
    #replay-status { color: #ffcc00; }

    #game-container {
      position: relative;
      width: 320px;
      height: 320px;
      max-width: 85vw;
      max-height: 85vw;
      aspect-ratio: 1/1;
    }
    canvas { 
      background-color: #111; 
      border: 3px solid #fff; 
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
    }

    #controls { margin-top: 15px; display: flex; gap: 12px; align-items: center; }
    .btn { 
      background: rgba(255, 255, 255, 0.1); 
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
      color: white; 
      padding: 10px 20px; 
      border-radius: 12px; 
      font-size: 18px; 
      cursor: pointer; 
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: all 0.2s;
    }
    .btn:hover { background: rgba(255, 255, 255, 0.2); transform: scale(1.05); }
    
    #progress-slider { 
      width: 320px; 
      max-width: 85vw;
      margin-top: 15px; 
      cursor: pointer; 
      -webkit-appearance: none;
      appearance: none;
      height: 5px;
      background: #333;
      border-radius: 3px;
      outline: none;
    }
    #progress-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      background: #6cf;
      border-radius: 50%;
    }

    #back-link { 
      color: #6cf; 
      margin-top: 20px; 
      font-size: 18px; 
      text-decoration: none; 
      padding: 8px 16px;
    }
    #back-link:hover { text-decoration: underline; }

    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #3b4050; border-radius: 4px; }
  </style>
</head>
<body>
  <h1>🐍 遊戲回放</h1>
  
  <div id="top-bar">
    <span id="replay-status">載入中...</span>
    <span id="current-score">得分：0</span>
  </div>

  <div id="game-container">
    <canvas id="game" width="400" height="400"></canvas>
  </div>

  <input type="range" id="progress-slider" value="0" step="1">

  <div id="controls">
    <div class="btn" id="restart-btn">⏮️</div>
    <div class="btn" id="play-pause-btn">▶️</div>
    <div id="frame-counter" style="font-family: 'Roboto Mono', monospace; font-size: 15px;">0 / 0</div>
  </div>

  <a id="back-link" href="index.html">返回遊戲</a>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAtkZyxuP2alDTUm1AA7EAlPYSvvZAznEI",
      authDomain: "cogent-altar-468009-p7.firebaseapp.com",
      projectId: "cogent-altar-468009-p7",
      storageBucket: "cogent-altar-468009-p7.firebasestorage.app",
      messagingSenderId: "849610525376",
      appId: "1:849610525376:web:154b5103d027710734fb25"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const statusText = document.getElementById("replay-status");
    const playPauseBtn = document.getElementById("play-pause-btn");
    const restartBtn = document.getElementById("restart-btn");
    const progressSlider = document.getElementById("progress-slider");
    const frameCounter = document.getElementById("frame-counter");
    const scoreText = document.getElementById("current-score");

    const gridSize = 20;
    const tileCount = 20;

    let replayData = [];
    let currentFrameIndex = 0;
    let isPlaying = false;
    let playbackSpeed = 150;
    let lastTime = 0;

    function drawFrame(index) {
      const frame = replayData[index];
      if (!frame) return;
      currentFrameIndex = index;

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "red";
      ctx.fillRect(frame.apple.x * gridSize + 1, frame.apple.y * gridSize + 1, gridSize - 2, gridSize - 2);
      ctx.fillStyle = "lime";
      for (let s of frame.snake) {
        ctx.fillRect(s.x * gridSize + 1, s.y * gridSize + 1, gridSize - 2, gridSize - 2);
      }
      scoreText.innerText = "得分：" + frame.score;
      progressSlider.value = index;
      frameCounter.textContent = `${index + 1}/${replayData.length}`;
    }

    function togglePlay() { isPlaying = !isPlaying; playPauseBtn.textContent = isPlaying ? "⏸️" : "▶️"; }
    function pause() { isPlaying = false; playPauseBtn.textContent = "▶️"; }
    
    restartBtn.onclick = () => { pause(); drawFrame(0); };
    playPauseBtn.onclick = togglePlay;
    progressSlider.oninput = (e) => { pause(); drawFrame(parseInt(e.target.value)); };

    function playbackLoop(currentTime) {
        requestAnimationFrame(playbackLoop);
        if (!isPlaying) return;
        if (currentTime - lastTime < playbackSpeed) return;
        lastTime = currentTime;

        if (currentFrameIndex < replayData.length - 1) {
          drawFrame(currentFrameIndex + 1);
        } else {
          pause();
        }
    }
    requestAnimationFrame(playbackLoop);

    function generateFramesFromHistory(data) {
        const { initialState, moves, algorithmVersion } = data;
        let snake = JSON.parse(JSON.stringify(initialState.snake));
        let apple = { ...initialState.apple };
        let score = 0;
        let dx = 0, dy = 0;
        let frameCount = 0;
        let moveIndex = 0;
        const generatedFrames = [];
        const MAX_FRAMES = 20000;

        while (frameCount < MAX_FRAMES) {
            generatedFrames.push({
                snake: JSON.parse(JSON.stringify(snake)),
                apple: { ...apple },
                score: score
            });

            while (moveIndex < moves.length && moves[moveIndex].frame === frameCount) {
                const m = moves[moveIndex].move;
                if (m === 'u' && (dy === 0 || frameCount === 0)) { dx = 0; dy = -1; }
                else if (m === 'd' && (dy === 0 || frameCount === 0)) { dx = 0; dy = 1; }
                else if (m === 'l' && (dx === 0 || frameCount === 0)) { dx = -1; dy = 0; }
                else if (m === 'r' && (dx === 0 || frameCount === 0)) { dx = 1; dy = 0; }
                moveIndex++;
            }

            if (dx === 0 && dy === 0 && frameCount > 0) break;

            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount || snake.some(s => s.x === head.x && s.y === head.y)) break;

            snake.unshift(head);
            if (head.x === apple.x && head.y === apple.y) {
                score++;
                if (snake.length >= tileCount * tileCount) break;
                const emptyCells = [];
                const snakeCellSet = new Set(snake.map(s => `${s.x},${s.y}`));
                for (let x = 0; x < tileCount; x++) {
                    for (let y = 0; y < tileCount; y++) {
                        if (!snakeCellSet.has(`${x},${y}`)) emptyCells.push({ x, y });
                    }
                }
                if (emptyCells.length > 0) {
                    const h = snake[0];
                    if (algorithmVersion >= 4) {
                        apple = emptyCells[(h.x * 7 + h.y * 13 + score * 17 + (frameCount + 1) * 3) % emptyCells.length];
                    } else if (algorithmVersion >= 2) {
                        apple = emptyCells[(h.x * 7 + h.y * 13 + score * 17) % emptyCells.length];
                    } else {
                        let attempts = 0;
                        do {
                            const tail = snake.length > 1 ? snake[1] : snake[0];
                            apple = { x: (snake[0].x * 3 + tail.x * 5 + score) % tileCount, y: (snake[0].y * 7 + tail.y * 2 + score) % tileCount };
                            attempts++;
                        } while (snake.some(s => s.x === apple.x && s.y === apple.y) && attempts < 100);
                    }
                } else break;
            } else {
                snake.pop();
            }
            frameCount++;
        }
        return generatedFrames;
    }

    async function initializeReplay() {
      const urlParams = new URLSearchParams(window.location.search);
      const id = urlParams.get('id');
      if (!id) { statusText.textContent = "無 ID"; return; }
      
      document.getElementById('back-link').href = `index.html?last_replay_id=${id}`;

      try {
        statusText.textContent = "讀取中...";
        const doc = await db.collection("replays").doc(id).get();
        if (doc.exists) {
          const data = doc.data();
          statusText.textContent = "解析中...";
          replayData = generateFramesFromHistory(data);
          statusText.textContent = "載入成功!";
          progressSlider.max = replayData.length - 1;
          drawFrame(0);
          document.addEventListener('keydown', (e) => { if (e.code === 'Space') { e.preventDefault(); togglePlay(); } });
        } else { statusText.textContent = "無紀錄"; }
      } catch (error) { statusText.textContent = "失敗"; }
    }
    initializeReplay();
  </script>
</body>
</html>
