<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>🐍 遊戲回放</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <link rel="icon" href="favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    body { 
      background-color: #000; 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      color: white; 
      font-family: "Microsoft JhengHei", "微軟正黑體", sans-serif; 
      margin: 0; 
      padding-top: 20px;
      min-height: 100vh;
      overflow-x: hidden;
    }
    h1 { margin: 10px 0; font-size: 28px; }
    #replay-status { margin: 10px; color: #ffcc00; text-align: center; font-size: 14px; }
    canvas { 
      background-color: #111; 
      border: 3px solid #fff; 
      max-width: 90vw;
      width: 400px;
      height: 400px;
      aspect-ratio: 1 / 1;
    }
    #controls { margin-top: 15px; display: flex; gap: 12px; align-items: center; }
    .btn { 
      background: #444; 
      color: white; 
      padding: 10px 20px; 
      border-radius: 10px; 
      font-size: 16px; 
      user-select: none; 
      cursor: pointer; 
      transition: background 0.1s;
    }
    .btn:active { background: #777; }
    
    #progress-slider { 
      width: 400px; 
      max-width: 90vw;
      margin-top: 15px; 
      cursor: pointer; 
      -webkit-appearance: none;
      appearance: none;
      height: 6px;
      background: #444;
      border-radius: 3px;
      outline: none;
    }
    #progress-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      background: #74b9ff;
      border-radius: 50%;
    }

    #back-link { 
      color: #6cf; 
      margin-top: 20px; 
      font-size: 18px; 
      text-decoration: none; 
      padding-bottom: 50px;
    }
    #back-link:hover { text-decoration: underline; }

    #aki-footer {
      position: fixed;
      bottom: 20px;
      left: 20px;
      color: #ffeb3b;
      font-weight: bold;
      font-size: 1rem;
      font-family: 'Roboto Mono', monospace;
      cursor: default;
      user-select: none;
      display: flex;
      gap: 2px;
      z-index: 2147483647;
      pointer-events: auto;
    }
    .char-span { display: inline-block; transition: transform 0.1s ease-out; will-change: transform; }

    ::-webkit-scrollbar { width: 10px; }
    ::-webkit-scrollbar-track { background: #222; }
    ::-webkit-scrollbar-thumb { background: #6cf; border-radius: 5px; }
  </style>
</head>
<body>
  <h1>🐍 遊戲回放</h1>
  <div style="display: flex; gap: 20px; margin-bottom: 5px;">
    <p id="replay-status" style="margin: 0;">載入中...</p>
    <p id="current-score" style="margin: 0;">目前分數：0</p>
  </div>
  <canvas id="game" width="400" height="400"></canvas>
  <input type="range" id="progress-slider" value="0" step="1">
  <div id="controls">
    <div class="btn" id="restart-btn">⏮️ 重頭</div>
    <div class="btn" id="play-pause-btn">▶️ 播放</div>
    <div id="frame-counter" style="font-family: monospace;">0 / 0</div>
  </div>
  <a id="back-link" href="index.html">返回遊戲</a>

  <div id="aki-footer">Made by Aki</div>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAtkZyxuP2alDTUm1AA7EAlPYSvvZAznEI",
      authDomain: "cogent-altar-468009-p7.firebaseapp.com",
      projectId: "cogent-altar-468009-p7",
      storageBucket: "cogent-altar-468009-p7.firebasestorage.app",
      messagingSenderId: "849610525376",
      appId: "1:849610525376:web:154b5103d027710734fb25"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const statusText = document.getElementById("replay-status");
    const playPauseBtn = document.getElementById("play-pause-btn");
    const restartBtn = document.getElementById("restart-btn");
    const progressSlider = document.getElementById("progress-slider");
    const frameCounter = document.getElementById("frame-counter");

    const gridSize = 20;
    const tileCount = canvas.width / gridSize;

    let replayData = [];
    let currentFrameIndex = 0;
    let isPlaying = false;
    let playbackInterval;
    let currentReplayId = null;

    function drawFrame(index) {
      const frame = replayData[index];
      if (!frame) return;
      currentFrameIndex = index;

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "red";
      ctx.fillRect(frame.apple.x * gridSize, frame.apple.y * gridSize, gridSize, gridSize);
      ctx.fillStyle = "lime";
      for (let s of frame.snake) {
        ctx.fillRect(s.x * gridSize, s.y * gridSize, gridSize - 1, gridSize - 1);
      }
      document.getElementById("current-score").innerText = "目前分數：" + frame.score;

      progressSlider.value = index;
      frameCounter.textContent = `${index + 1} / ${replayData.length}`;
    }

    function togglePlayPause() { isPlaying ? pause() : play(); }
    function play() {
      if (currentFrameIndex >= replayData.length - 1) return;
      isPlaying = true;
      playPauseBtn.textContent = "⏸️ 暫停";
      playbackInterval = setInterval(() => {
        if (currentFrameIndex < replayData.length - 1) {
          drawFrame(currentFrameIndex + 1);
        } else {
          pause();
        }
      }, 150);
    }
    function pause() {
      isPlaying = false;
      playPauseBtn.textContent = "▶️ 播放";
      clearInterval(playbackInterval);
    }
    function restart() {
      pause();
      drawFrame(0);
    }

    function generateFramesFromHistory(data) {
        const { initialState, moves, algorithmVersion } = data;
        let snake = JSON.parse(JSON.stringify(initialState.snake));
        let apple = { ...initialState.apple };
        let score = 0;
        let dx = 0, dy = 0;
        let frameCount = 0;
        let moveIndex = 0;
        const generatedFrames = [];
        const MAX_FRAMES = 20000;

        while (frameCount < MAX_FRAMES) {
            generatedFrames.push({
                snake: JSON.parse(JSON.stringify(snake)),
                apple: { ...apple },
                score: score
            });

            while (moveIndex < moves.length && moves[moveIndex].frame === frameCount) {
                const move = moves[moveIndex].move;
                if (move === 'u' && (dy === 0 || frameCount === 0)) { dx = 0; dy = -1; }
                else if (move === 'd' && (dy === 0 || frameCount === 0)) { dx = 0; dy = 1; }
                else if (move === 'l' && (dx === 0 || frameCount === 0)) { dx = -1; dy = 0; }
                else if (move === 'r' && (dx === 0 || frameCount === 0)) { dx = 1; dy = 0; }
                moveIndex++;
            }

            if (dx === 0 && dy === 0 && frameCount > 0) break;

            const head = { x: snake[0].x + dx, y: snake[0].y + dy };

            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount || snake.some(s => s.x === head.x && s.y === head.y)) {
                break;
            }

            snake.unshift(head);
            if (head.x === apple.x && head.y === apple.y) {
                score++;
                if (snake.length >= tileCount * tileCount) break;

                const emptyCells = [];
                const snakeCellSet = new Set(snake.map(s => `${s.x},${s.y}`));
                for (let x = 0; x < tileCount; x++) {
                    for (let y = 0; y < tileCount; y++) {
                        if (!snakeCellSet.has(`${x},${y}`)) emptyCells.push({ x, y });
                    }
                }
                
                if (emptyCells.length > 0) {
                    const h = snake[0];
                    if (algorithmVersion >= 4) {
                        const deterministicIndex = (h.x * 7 + h.y * 13 + score * 17 + (frameCount + 1) * 3) % emptyCells.length;
                        apple = emptyCells[deterministicIndex];
                    } else if (algorithmVersion >= 2) {
                        const deterministicIndex = (h.x * 7 + h.y * 13 + score * 17) % emptyCells.length;
                        apple = emptyCells[deterministicIndex];
                    } else {
                        let attempts = 0;
                        do {
                            const tail = snake.length > 1 ? snake[1] : snake[0];
                            apple = { 
                                x: (snake[0].x * 3 + tail.x * 5 + score) % tileCount,
                                y: (snake[0].y * 7 + tail.y * 2 + score) % tileCount
                            };
                            attempts++;
                        } while (snake.some(s => s.x === apple.x && s.y === apple.y) && attempts < 100);
                    }
                } else break;
            } else {
                snake.pop();
            }
            frameCount++;
        }
        return generatedFrames;
    }

    async function initializeReplay() {
      const urlParams = new URLSearchParams(window.location.search);
      currentReplayId = urlParams.get('id');

      if (!currentReplayId) {
        statusText.textContent = "找不到回放 ID。";
        return;
      }

      const backLink = document.getElementById('back-link');
      backLink.href = `index.html?last_replay_id=${currentReplayId}`;

      try {
        statusText.textContent = "正在讀取紀錄...";
        const doc = await db.collection("replays").doc(currentReplayId).get();

        if (doc.exists) {
          const data = doc.data();
          statusText.textContent = "產生中...";

          replayData = generateFramesFromHistory(data);

          if (replayData.length === 0) {
              statusText.textContent = "錯誤。";
              return;
          }

          statusText.textContent = `載入成功！最終分數：${data.finalScore}`;
          progressSlider.max = replayData.length - 1;
          drawFrame(0);

          playPauseBtn.addEventListener("click", togglePlayPause);
          restartBtn.addEventListener("click", restart);
          progressSlider.addEventListener("input", (e) => {
              pause();
              drawFrame(parseInt(e.target.value));
          });

          document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') { e.preventDefault(); togglePlayPause(); }
          });
        } else {
          statusText.textContent = "找不到紀錄。";
        }
      } catch (error) {
        console.error(error);
        statusText.textContent = "讀取失敗。";
      }
    }

    initializeReplay();

    const footer = document.getElementById('aki-footer');
    if (footer) {
      const text = footer.textContent;
      footer.textContent = '';
      const spans = [];
      for (let char of text) {
        const span = document.createElement('span');
        span.textContent = char;
        if (char === ' ') span.style.width = '0.5em';
        span.className = 'char-span';
        footer.appendChild(span);
        spans.push(span);
      }
      document.addEventListener('mousemove', (e) => {
        spans.forEach(span => {
          const rect = span.getBoundingClientRect();
          const distance = Math.sqrt(Math.pow(e.clientX - (rect.left + rect.width/2), 2) + Math.pow(e.clientY - (rect.top + rect.height/2), 2));
          if (distance < 60) {
            const force = (60 - distance) / 60;
            span.style.transform = `translate(${-(e.clientX - (rect.left + rect.width/2)) / distance * force * 10}px, ${-(e.clientY - (rect.top + rect.height/2)) / distance * force * 10}px)`;
          } else span.style.transform = 'translate(0, 0)';
        });
      });
    }
  </script>
</body>
</html>
